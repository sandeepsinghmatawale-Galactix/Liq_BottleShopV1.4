<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register New Bar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .section-header {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 8px 14px;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .step-indicator .step {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem;
        }
        .step.active  { background: #667eea; color: white; }
        .step.pending { background: #dee2e6; color: #6c757d; }
        .step-line { flex: 1; height: 2px; background: #dee2e6; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-shop"></i> Liquor Inventory
        </a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 860px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item active">Register New Bar</li>
        </ol>
    </nav>

    <!-- Step Indicator -->
    <div class="d-flex align-items-center mb-4 step-indicator gap-2">
        <div class="step active">1</div>
        <div class="step-line"></div>
        <div class="step pending">2</div>
        <div class="step-line"></div>
        <div class="step pending">3</div>
        <div class="step-line"></div>
        <div class="step pending">4</div>
        <span class="ms-3 text-muted small">
            Step 1 of 4 — Bar Registration
        </span>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0">
                <i class="bi bi-building-add"></i> Register New Bar / Outlet
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/bars/register}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <!-- BASIC INFO -->
                <div class="section-header">
                    <i class="bi bi-info-circle"></i> Basic Information
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Bar / Outlet Name <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="barName" class="form-control"
                               placeholder="e.g. The Royal Bar" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Bar Type</label>
                        <select name="barType" class="form-select">
                            <option value="">-- Select Type --</option>
                            <option th:each="t : ${barTypes}"
                                    th:value="${t}"
                                    th:text="${t.replace('_',' ')}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Owner / Manager Name</label>
                        <input type="text" name="ownerName" class="form-control"
                               placeholder="e.g. Ravi Kumar"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Contact Number</label>
                        <input type="text" name="contactNumber" class="form-control"
                               placeholder="9876543210"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="bar@email.com"/>
                    </div>
                </div>

                <!-- ADDRESS -->
                <div class="section-header">
                    <i class="bi bi-geo-alt"></i> Address
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Address Line</label>
                        <input type="text" name="addressLine" class="form-control"
                               placeholder="Shop No / Building / Street"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" name="city" class="form-control"
                               placeholder="Hyderabad"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">State</label>
                        <input type="text" name="state" class="form-control"
                               placeholder="Telangana"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">PIN Code</label>
                        <input type="text" name="pinCode" class="form-control"
                               placeholder="500001"/>
                    </div>
                </div>

                <!-- LICENSE & COMPLIANCE -->
                <div class="section-header">
                    <i class="bi bi-shield-check"></i> License &amp; Compliance
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">License Number</label>
                        <input type="text" name="licenseNumber" class="form-control"
                               placeholder="e.g. FL3/2024/HYD/001"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">License Type</label>
                        <input type="text" name="licenseType" class="form-control"
                               placeholder="e.g. FL-2, CL-9"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">License Expiry Date</label>
                        <input type="date" name="licenseExpiryDate" class="form-control"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">GSTIN</label>
                        <input type="text" name="gstin" class="form-control"
                               placeholder="36AABCU9603R1ZX" maxlength="15"/>
                    </div>
                </div>

                <!-- OPERATIONAL CONFIG -->
                <div class="section-header">
                    <i class="bi bi-gear"></i> Operational Configuration
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Shift Configuration</label>
                        <select name="shiftConfig" class="form-select">
                            <option value="SINGLE">Single Shift</option>
                            <option value="DOUBLE">Double Shift</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Opening Date</label>
                        <input type="date" name="openingDate" class="form-control"/>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-2">
                    <a th:href="@{/dashboard}"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary px-4">
                        Save &amp; Configure Wells
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
