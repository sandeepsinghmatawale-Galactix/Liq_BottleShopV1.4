<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Setup - Well Opening Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .table-input { width: 100px; text-align: right; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-cup-straw"></i>
            Admin Setup — Well Opening Stock
        </span>
        <span class="text-white small">
            Bar: <strong th:text="${session.bar != null ? session.bar.barName : 'N/A'}"></strong>
            &nbsp;|&nbsp; Session #<span th:text="${sessionId}"></span>
        </span>
    </div>
</nav>

<div class="container-fluid mt-4">

    <div th:if="${error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="alert alert-info">
        <i class="bi bi-info-circle"></i>
        <strong>Admin Setup:</strong> Enter the current stock at each bar well for each product.
        Only enter quantities physically present right now. Leave as <strong>0</strong> if empty.
    </div>

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">
                <i class="bi bi-2-circle"></i> Step 4b: Well Opening Stock
            </h5>
        </div>
        <div class="card-body">

            <form th:action="@{/admin/setup/{id}/wells(id=${sessionId})}" method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Product</th>
                                <th>Brand</th>
                                <th>Category</th>
                                <th th:each="wellName : ${wellNames}"
                                    class="text-center"
                                    th:text="${wellName}">Well</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${products}">
                                <td>
                                    <strong th:text="${product.productName}"></strong>
                                    <small class="d-block text-muted"
                                           th:if="${product.volumeML != null}"
                                           th:text="${product.volumeML} + ' ml'"></small>
                                </td>
                                <td class="text-muted small" th:text="${product.brand}"></td>
                                <td th:text="${product.category}"></td>
                                <td th:each="wellName : ${wellNames}" class="text-center">
                                    <input type="number"
                                           class="form-control table-input mx-auto"
                                           step="0.01" min="0"
                                           th:name="'opening_' + ${product.productId} + '_' + ${wellName}"
                                           th:value="${existingStock != null and existingStock[product.productId + '_' + wellName] != null ? existingStock[product.productId + '_' + wellName] : 0}"/>
                                </td>
                            </tr>
                            <tr th:if="${products == null or #lists.isEmpty(products)}">
                                <td th:colspan="${3 + (wellNames != null ? #lists.size(wellNames) : 1)}"
                                    class="text-center text-muted">
                                    No products found.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/admin/setup/{id}/stockroom(id=${sessionId})}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Stockroom
                    </a>
                    <button type="submit" class="btn btn-success btn-lg">
                        Save &amp; Review →
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
